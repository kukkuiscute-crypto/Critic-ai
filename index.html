<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critic AI</title>
    <style>
        body {
            background-color: #0d1117;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #22272e;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Welcome to Routine Critic AI</h1>
    <textarea id="dailyRoutineInput" placeholder="Enter your daily routine..."></textarea>
    <button id="critiqueButton">Critique</button>
    <div id="output"></div>

    <script>
        const critiqueButton = document.getElementById('critiqueButton');
        const output = document.getElementById('output');
        const dailyRoutineInput = document.getElementById('dailyRoutineInput');

        critiqueButton.addEventListener('click', () => {
            const routine = dailyRoutineInput.value;
            const analysis = analyzeRoutine(routine);
            output.innerHTML = analysis;
            localStorage.setItem('routineAnalysis', analysis);
        });

        function analyzeRoutine(routine) {
            let productivityKeywords = ['study', 'work', 'exercise'];
            let distractionKeywords = ['gaming', 'YouTube', 'TikTok', 'Netflix', 'sleep'];
            let productScore = 0;
            let distractionScore = 0;

            productivityKeywords.forEach(keyword => {
                if (routine.includes(keyword)) productScore++;
            });

            distractionKeywords.forEach(keyword => {
                if (routine.includes(keyword)) distractionScore++;
            });

            let grade = gradingSystem(productScore, distractionScore);
            return `Your routine analysis: ${grade}`;
        }

        function gradingSystem(productScore, distractionScore) {
            let grade;
            if (productScore > distractionScore) {
                grade = 'A';
            } else if (productScore === distractionScore) {
                grade = 'C';
            } else {
                grade = 'F';
            }
            return grade;
        }

        document.addEventListener('keydown', (event) => {
            if (event.ctrlKey && event.key === 'Enter') {
                critiqueButton.click();
            }
            if (event.ctrlKey && event.key === 'r') {
                dailyRoutineInput.value = '';
                output.innerHTML = '';
            }
        });
    </script>
</body>
</html>
